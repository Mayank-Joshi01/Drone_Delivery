version: '1.3'

services:
#  Backend Service
  server:
    build: ./Server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    volumes:
      - ./Server:/Server
      - /Server/node_modules
    networks:
      - Drone_Drop
    restart: always

  # Client Service
  client:
    build: ./Client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./Client:/Client
      - /Client/node_modules
    networks:
      - Drone_Drop
    restart: always

networks:
  Drone_Drop:
    driver: bridge

    